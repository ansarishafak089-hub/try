<!DOCTYPE html>
<html lang="en">
<head>
    <style>*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

header{
    background:#222;
    padding:20px;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:white;
}

nav ul{
    display:flex;
    list-style:none;
}

nav ul li{
    margin-left:20px;
}

nav ul li a{
    color:white;
    text-decoration:none;
}

.hero{
    display:flex;
    justify-content:center;
    align-items:center;
    height:90vh;
    padding:50px;
}

.content{
    width:50%;
}

.content h1{
    font-size:50px;
    color:#333;
}

.content h3{
    color:#0077ff;
    margin:15px 0;
}

.content p{
    margin-bottom:20px;
    line-height:1.6;
}

button{
    padding:12px 25px;
    border:none;
    background:#0077ff;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.image img{
    width:350px;
    border-radius:50%;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falak Portfolio</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <h2 class="logo">Falak.</h2>

            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Skills</a></li>
                <li><a href="#">Projects</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">

        <div class="content">
            <h1>Hello, I'm Falak</h1>

            <h3>AI Tools Student</h3>

            <p>
                Welcome to my portfolio website.
                I am learning web design and AI tools.
            </p>

            <button>Download CV</button>
        </div>

        <div class="image">
            <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43b" alt="Profile">
        </div>

    </section>

</body>
</html>
